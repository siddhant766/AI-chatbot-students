<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDU AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar">
  <h2>EDU AI</h2>
  <button class="new-chat">+ New Chat</button>
  <div class="menu">AI Chat</div>
  <div class="history">
    <p>Study Planner</p>
    <p>Math Help</p>
    <p>Science Notes</p>
  </div>
</div>

<div class="main">
  <nav>
    <span>Dashboard</span>
    <span>Labs</span>
    <span>Support</span>
  </nav>

  <div class="hero">
    <h1>Welcome Back ✨</h1>
    <h2>What Can I Help You Learn Today?</h2>
  </div>

  <div class="chat-box">
    <textarea id="prompt" placeholder="Ask EDU AI..."></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <div id="response"></div>
</div>

<script src="script.js"></script>
</body>
</html>
